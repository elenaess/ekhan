<!DOCTYPE html><html lang='pt-br'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>elena's page</title>
<link rel="icon" href="favicon.png" type="image/png">
<link rel="shortcut icon" href="favicon.png" type="image/png">
<link rel="apple-touch-icon" href="favicon.png">

<style>
body{margin:0;font-family:Arial;background:#0d0d0d;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;background:radial-gradient(#222,#000)}
.card{width:min(92vw,520px);background:#161616;border:1px solid #333;border-radius:28px;padding:28px;box-shadow:0 20px 60px #0008;text-align:center}
.avatar{width:120px;height:120px;border-radius:50%;object-fit:cover;border:4px solid #444}
h1{margin:12px 0 4px}p{color:#bbb}
.meta{color:#888;font-size:14px}
.tabs{display:flex;gap:10px;justify-content:center;margin:20px 0}
.tabs button{background:#222;color:#fff;border:1px solid #444;padding:12px 18px;border-radius:999px;cursor:pointer}
.tabs button:hover{background:#fff;color:#000}
.panel{display:none;text-align:left;background:#111;border:1px solid #333;border-radius:18px;padding:18px}
.panel.active{display:block}
.social{
    display:flex;
    justify-content:center;
    gap:16px;
    margin-top:24px;
}

.social a{
    width:46px;
    height:46px;
    border-radius:50%;
    background:#d9d9d9; /* cinza claro */
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    transition:transform .15s ease, background .25s ease;
}

.social a:hover{
    background:#f2f2f2;
}

.social img{
    width:24px;
    height:24px;
    object-fit:contain;
}

*{-webkit-tap-highlight-color:transparent;}
.tabs button,.social a{position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;transition:transform .15s ease,background .25s ease}
.tabs button::after,.social a::after{content:"";position:absolute;inset:0;background:radial-gradient(circle,rgba(255,255,255,.28) 0%,rgba(255,255,255,.12) 35%,transparent 75%);opacity:0;transition:opacity .22s ease;pointer-events:none}
.tabs button:active::after,.social a:active::after{opacity:1}
.tabs button:active,.social a:active{transform:scale(.97)}

.panel a{
    color:#4da3ff;
    text-decoration:underline;
}

.panel a:hover{
    color:#7dbdff;
}

</style></head><body>
<div class='card'>
<img class='avatar' src='perfil.jpg'>
<h1>elena.</h1>
<div class='meta'>ela/dela • 21 anos</div>
<p>chemistry and tomatoes</p>
<div class='tabs'>
<button onclick='show("s")'>Serviços</button>
<button onclick='show("p")'>Portfólio</button>
<button onclick='show("r")'>Extra</button>
</div>
<div id='s' class='panel active'><h3>Serviços</h3><ul><li>Web Design</li><li>Edições de fotos e vídeos</li><li>Programação de Bots</li></ul></div>
<div id='p' class='panel'>
    <h3>Portfólio</h3>

    <p>
        <a href="https://editoracolmeia.com.br" target="_blank">
            editoracolmeia.com.br
        </a>
    </p>

    <p>
        <a href="ekhan.html">
            Tradutor de Conlang Pessoal
        </a>
    </p>
</div>
<div id='r' class='panel'><h3>Extra</h3><p>Gosto do meu gatinho Victor.</p></div>
<div class="social">
    <a href="https://x.com/etilenoglicol" title="Twitter">
        <img src="twitter.png" alt="Twitter">
    </a>

    <a href="#" title="Last.fm">
        <img src="lastfm.png" alt="Last.fm">
    </a>

    <a href="#" title="Discord">
        <img src="discord.jpg" alt="Discord">
    </a>
</div></div>
<script>
function show(id){document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active')}
</script></body></html>
